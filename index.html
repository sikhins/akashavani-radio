<!DOCTYPE html>
<html lang="ml">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Г ВґВ†Г ВґВ•Г ВґВѕГ ВґВ¶Г ВґВµГ ВґВѕГ ВґВЈГ ВґВї Malayalam Radio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #b8a4e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      padding: 20px;
    }

    .radio-card {
      background: #0b0914;
      border-radius: 28px;
      width: min(92vw, 860px);
      aspect-ratio: 16/9.2;
      display: flex;
      overflow: hidden;
      box-shadow: 0 40px 80px rgba(0,0,0,0.5);
      position: relative;
    }

    /* ГўВ”ВЂГўВ”ВЂ DIAL SECTION ГўВ”ВЂГўВ”ВЂ */
    .dial-wrap {
      position: relative;
      width: 54%;
      flex-shrink: 0;
      overflow: hidden;
    }

    .dial-svg {
      width: 140%;
      height: 140%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-62%, -50%);
    }

    /* ГўВ”ВЂГўВ”ВЂ INFO SECTION ГўВ”ВЂГўВ”ВЂ */
    .info-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px 26px 22px 8px;
      position: relative;
      z-index: 2;
    }

    .top-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 14px;
      margin-bottom: 12px;
    }

    .rec-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #666;
    }

    .rec-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #cc3333;
      box-shadow: 0 0 8px #cc3333;
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%,100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .clock {
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      color: #bbb;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .clock-icon {
      width: 14px; height: 14px;
      border: 1.5px solid #888;
      border-radius: 50%;
      position: relative;
    }
    .clock-icon::after {
      content: '';
      position: absolute;
      width: 4px; height: 1.5px;
      background: #888;
      top: 5px; left: 4px;
      transform-origin: left center;
    }

    .channel-info {
      margin-top: auto;
    }

    .channel-label {
      font-size: 12px;
      letter-spacing: 0.1em;
      color: #666;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .channel-label .freq-inline {
      color: #999;
      font-weight: 500;
    }

    .freq-display-box {
      background: #1a1628;
      border-radius: 18px;
      padding: 8px 18px 10px;
      display: inline-flex;
      align-items: baseline;
      gap: 2px;
      margin-bottom: 10px;
    }

    .freq-zero {
      font-family: 'Share Tech Mono', monospace;
      font-size: 40px;
      font-weight: 700;
      color: #444;
    }

    .freq-main {
      font-family: 'Share Tech Mono', monospace;
      font-size: 40px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -1px;
    }

    .station-name {
      font-size: 12px;
      color: #555;
      margin-bottom: 16px;
      letter-spacing: 0.04em;
    }

    .mode-row {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 14px;
    }

    .mode-btn {
      font-size: 18px;
      font-weight: 700;
      color: #333;
      cursor: default;
    }
    .mode-btn.active { color: #7c3aed; }

    .divider {
      width: 1px;
      height: 18px;
      background: #333;
    }

    /* Station nav dots */
    .station-nav {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .s-nav-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #2a2535;
      border: 1px solid #3a3545;
      cursor: pointer;
      transition: all 0.2s;
    }
    .s-nav-dot:hover { background: #5a3a9a; }
    .s-nav-dot.active {
      background: #7c3aed;
      border-color: #9d65f8;
      box-shadow: 0 0 6px rgba(124,58,237,0.6);
    }

    /* Status / live indicator */
    .np-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      color: #555;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 4px;
      min-height: 16px;
    }
    .np-live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #7c3aed;
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%,100% { box-shadow: 0 0 0 0 rgba(124,58,237,0.7); }
      50%      { box-shadow: 0 0 0 5px rgba(124,58,237,0); }
    }

    /* Tuning state */
    .tuning-bar {
      display: inline-block;
      width: 4px; height: 10px;
      background: #7c3aed;
      border-radius: 2px;
      margin-right: 1px;
      animation: tuning-eq 0.6s ease-in-out infinite alternate;
    }
    .tuning-bar:nth-child(2) { animation-delay: 0.1s; height: 7px; }
    .tuning-bar:nth-child(3) { animation-delay: 0.2s; height: 12px; }
    .tuning-bar:nth-child(4) { animation-delay: 0.05s; height: 8px; }
    @keyframes tuning-eq {
      from { transform: scaleY(0.4); opacity: 0.5; }
      to   { transform: scaleY(1.4); opacity: 1; }
    }

    /* Freq display flicker during tuning */
    @keyframes freq-flicker {
      0%   { opacity: 1; }
      10%  { opacity: 0.4; }
      15%  { opacity: 0.9; }
      30%  { opacity: 0.3; }
      40%  { opacity: 1; }
      55%  { opacity: 0.6; }
      70%  { opacity: 1; }
      85%  { opacity: 0.5; }
      100% { opacity: 1; }
    }
    .freq-main.tuning {
      animation: freq-flicker 0.4s linear infinite;
    }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%);
      background: #1a0f0f;
      border: 1px solid rgba(255,80,80,0.4);
      color: rgba(255,130,130,0.9);
      font-size: 12px; padding: 10px 20px;
      border-radius: 10px; display: none; z-index: 99;
      white-space: nowrap;
    }
    .toast.show { display: block; }

    /* ГўВ”ВЂГўВ”ВЂ MOBILE ГўВ”ВЂГўВ”ВЂ */
    @media (max-width: 600px) {
      body { padding: 12px; }
      .radio-card {
        flex-direction: column;
        aspect-ratio: auto;
        width: 100%;
        border-radius: 20px;
      }
      .dial-wrap {
        width: 100%;
        height: 55vw;
      }
      .dial-svg {
        width: 160%;
        height: 160%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
      .info-panel {
        padding: 14px 20px 18px;
      }
    }
  </style>
</head>
<body>
<audio id="audioPlayer" preload="none"></audio>
<div class="toast" id="toast"></div>

<div class="radio-card">

  <!-- ГўВ”ВЂГўВ”ВЂ DIAL ГўВ”ВЂГўВ”ВЂ -->
  <div class="dial-wrap">
    <svg id="dialSvg" class="dial-svg" viewBox="0 0 520 520" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="dialGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#1a1428"/>
          <stop offset="100%" stop-color="#0b0914"/>
        </radialGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="arcglow">
          <feGaussianBlur stdDeviation="6" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Outer shadow ring -->
      <circle cx="260" cy="260" r="232" fill="none" stroke="#0a0812" stroke-width="8"/>
      <!-- Main dial face -->
      <circle cx="260" cy="260" r="228" fill="url(#dialGrad)"/>
      <!-- Subtle inner ring -->
      <circle cx="260" cy="260" r="210" fill="none" stroke="#1e1830" stroke-width="1"/>
      <circle cx="260" cy="260" r="195" fill="none" stroke="#171325" stroke-width="1"/>

      <!-- Purple arc background (dim) -->
      <path id="arcBg" fill="none" stroke="#2a1a4a" stroke-width="32" stroke-linecap="round"/>
      <!-- Purple arc active -->
      <path id="arcActive" fill="none" stroke="#7c3aed" stroke-width="28" stroke-linecap="round" filter="url(#arcglow)" opacity="0.9"/>
      <!-- Arc highlight edge -->
      <path id="arcEdge" fill="none" stroke="#a78bfa" stroke-width="4" stroke-linecap="round" opacity="0.5"/>

      <!-- Tick marks group -->
      <g id="ticks"></g>

      <!-- Frequency labels -->
      <g id="labels"></g>

      <!-- Station touch targets (larger invisible circle) -->
      <g id="stationHits"></g>

      <!-- Station dots -->
      <g id="stationDots"></g>

      <!-- Needle line from center to arc -->
      <line id="needle1" x1="260" y1="260" x2="260" y2="260"
            stroke="#7c3aed" stroke-width="1.5" opacity="0.4"/>
      <!-- Needle tip dot -->
      <circle id="needleTip" cx="260" cy="260" r="5"
              fill="#9d65f8" filter="url(#glow)"/>

      <!-- Center dot -->
      <circle cx="260" cy="260" r="6" fill="#2a2040"/>
      <circle cx="260" cy="260" r="3" fill="#7c3aed" opacity="0.6"/>

      <!-- Idle indicator text -->
      <text id="idleText" x="260" y="318" text-anchor="middle"
            fill="#3a3050" font-size="11" font-family="Inter, sans-serif"
            letter-spacing="0.12em" text-transform="uppercase">TAP TO TUNE</text>
    </svg>
  </div>

  <!-- ГўВ”ВЂГўВ”ВЂ INFO PANEL ГўВ”ВЂГўВ”ВЂ -->
  <div class="info-panel">
    <!-- Top bar -->
    <div class="top-bar">
      <div class="rec-indicator">
        REC <div class="rec-dot"></div>
      </div>
      <div class="clock">
        <div class="clock-icon"></div>
        <span id="clockText">00:00</span>
      </div>
    </div>

    <!-- Channel info -->
    <div class="channel-info">
      <div class="np-status" id="npStatus" style="visibility:hidden">
        <div class="np-live-dot"></div><span> LIVE</span>
      </div>
      <div class="channel-label">
        <span class="freq-inline" id="chanFreq">ГўВЂВ”</span> <span>FM CHANNEL</span>
      </div>
      <div class="freq-display-box">
        <span class="freq-zero">0</span><span class="freq-main" id="freqMain">00.0</span>
      </div>
      <div class="station-name" id="stationName">Tap a station on the dial</div>
    </div>

    <!-- Mode -->
    <div class="mode-row">
      <span class="mode-btn active">FM</span>
      <div class="divider"></div>
      <span class="mode-btn">AM</span>
    </div>

    <!-- Station nav dots -->
    <div class="station-nav" id="stationNav"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
<script>
// ГўВ”ВЂГўВ”ВЂ Stations ГўВ”ВЂГўВ”ВЂ
const stations = [
  { name: "Akashvani Thrissur",  freq: "100.9", url: "https://air.pc.cdn.bitgravity.com/air/live/pbaudio036/playlist.m3u8" },
  { name: "Akashvani Kerala",    freq: "101.9", url: "https://air.pc.cdn.bitgravity.com/air/live/pbaudio230/playlist.m3u8" },
  { name: "FM Rainbow Kochi",    freq: "102.3", url: "https://air.pc.cdn.bitgravity.com/air/live/pbaudio044/playlist.m3u8" },
  { name: "AIR News 24x7",       freq: "102.6", url: "https://airhlspush.pc.cdn.bitgravity.com/httppush/hlspbaudio002/hlspbaudio002_Auto.m3u8" },
  { name: "VB Malayalam",        freq: "103.0", url: "https://air.pc.cdn.bitgravity.com/air/live/pbaudio229/playlist.m3u8" },
];

// ГўВ”ВЂГўВ”ВЂ Radio Static (Web Audio API) ГўВ”ВЂГўВ”ВЂ
let audioCtx = null;
let staticSource = null;
let staticGain = null;

function ensureAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playStatic() {
  ensureAudioCtx();
  stopStatic();

  // White noise buffer (2s looping)
  const bufLen = audioCtx.sampleRate * 2;
  const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;

  staticSource = audioCtx.createBufferSource();
  staticSource.buffer = buf;
  staticSource.loop = true;

  // Band-pass filter to make it sound like FM static (center ~2kHz)
  const bpf = audioCtx.createBiquadFilter();
  bpf.type = 'bandpass';
  bpf.frequency.value = 2000;
  bpf.Q.value = 0.8;

  // High-shelf boost for crispiness
  const shelf = audioCtx.createBiquadFilter();
  shelf.type = 'highshelf';
  shelf.frequency.value = 4000;
  shelf.gain.value = 6;

  staticGain = audioCtx.createGain();
  staticGain.gain.setValueAtTime(0, audioCtx.currentTime);
  staticGain.gain.linearRampToValueAtTime(0.18, audioCtx.currentTime + 0.15);

  staticSource.connect(bpf);
  bpf.connect(shelf);
  shelf.connect(staticGain);
  staticGain.connect(audioCtx.destination);
  staticSource.start();
}

function stopStatic(fadeMs = 400) {
  if (!staticGain || !staticSource) return;
  const t = audioCtx.currentTime;
  staticGain.gain.setValueAtTime(staticGain.gain.value, t);
  staticGain.gain.linearRampToValueAtTime(0, t + fadeMs / 1000);
  const src = staticSource;
  setTimeout(() => { try { src.stop(); } catch(e){} }, fadeMs + 50);
  staticSource = null;
  staticGain = null;
}

// ГўВ”ВЂГўВ”ВЂ Glitch sweep: quickly scroll displayed freq digits while tuning ГўВ”ВЂГўВ”ВЂ
let glitchTimer = null;
function startFreqGlitch(targetFreq) {
  const el = document.getElementById('freqMain');
  el.classList.add('tuning');
  let t = 0;
  const digits = ['98.6','99.1','100.4','101.2','99.8','102.0','100.7','101.5','99.3','102.8'];
  glitchTimer = setInterval(() => {
    el.textContent = digits[t++ % digits.length];
  }, 80);
  // After needle animation finishes (~600ms), show real freq
  setTimeout(() => {
    clearInterval(glitchTimer);
    glitchTimer = null;
    el.textContent = parseFloat(targetFreq).toFixed(1);
    el.classList.remove('tuning');
  }, 700);
}

function stopFreqGlitch() {
  if (glitchTimer) { clearInterval(glitchTimer); glitchTimer = null; }
  document.getElementById('freqMain').classList.remove('tuning');
}

// ГўВ”ВЂГўВ”ВЂ Dial geometry ГўВ”ВЂГўВ”ВЂ
const CX = 260, CY = 260, R = 200;
// Arc sweeps 270Г‚В° from 7-o'clock (210Г‚В°) going COUNTERCLOCKWISE to 10-o'clock (300Г‚В°)
// In SVG angles (clockwise, 0=right):
// We'll use: low freq = 120Г‚В° (between 3 and 6 = bottom-right area), high freq = 390Г‚В° = 30Г‚В° (top-right area)
// Going clockwise through bottom and left and top
const ARC_START = 120; // 88 MHz position (bottom-right)
const ARC_END   = 390; // 108 MHz position (top-right, = 30Г‚В°)
const ARC_SWEEP = ARC_END - ARC_START; // 270Г‚В°
const MIN_FREQ = 88, MAX_FREQ = 108;

function freqToAngle(f) {
  return ARC_START + (f - MIN_FREQ) / (MAX_FREQ - MIN_FREQ) * ARC_SWEEP;
}

function toXY(cx, cy, r, angleDeg) {
  // SVG: 0Г‚В° = right, clockwise
  const rad = angleDeg * Math.PI / 180;
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
}

function svgArcPath(cx, cy, r, a1, a2) {
  // clockwise arc from a1 to a2
  const s = toXY(cx, cy, r, a1);
  const e = toXY(cx, cy, r, a2);
  let sweep = ((a2 - a1) % 360 + 360) % 360;
  const large = sweep > 180 ? 1 : 0;
  return `M ${s.x.toFixed(2)} ${s.y.toFixed(2)} A ${r} ${r} 0 ${large} 1 ${e.x.toFixed(2)} ${e.y.toFixed(2)}`;
}

const SVG_NS = 'http://www.w3.org/2000/svg';
function svgEl(tag, attrs) {
  const el = document.createElementNS(SVG_NS, tag);
  Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k, v));
  return el;
}

// ГўВ”ВЂГўВ”ВЂ Draw full bg arc ГўВ”ВЂГўВ”ВЂ
const arcBg = document.getElementById('arcBg');
arcBg.setAttribute('d', svgArcPath(CX, CY, R, ARC_START, ARC_END));

// ГўВ”ВЂГўВ”ВЂ Draw tick marks ГўВ”ВЂГўВ”ВЂ
const ticksG = document.getElementById('ticks');
for (let f = MIN_FREQ; f <= MAX_FREQ; f += 0.5) {
  const angle = freqToAngle(f);
  const major = (f % 2 === 0);
  const outerR = R - 12;
  const innerR = major ? R - 32 : R - 22;
  const p1 = toXY(CX, CY, outerR, angle);
  const p2 = toXY(CX, CY, innerR, angle);
  ticksG.appendChild(svgEl('line', {
    x1: p1.x, y1: p1.y, x2: p2.x, y2: p2.y,
    stroke: major ? '#35304a' : '#201c30',
    'stroke-width': major ? 1.5 : 1,
    'stroke-linecap': 'round'
  }));
}

// ГўВ”ВЂГўВ”ВЂ Frequency labels (outer side) ГўВ”ВЂГўВ”ВЂ
const labelsG = document.getElementById('labels');
[88, 92, 96, 100, 104, 108].forEach(f => {
  const angle = freqToAngle(f);
  const pos = toXY(CX, CY, R + 22, angle);
  const txt = svgEl('text', {
    x: pos.x, y: pos.y,
    'text-anchor': 'middle', 'dominant-baseline': 'middle',
    fill: '#3d3560', 'font-size': '12',
    'font-family': "'Share Tech Mono', monospace"
  });
  txt.textContent = f;
  labelsG.appendChild(txt);
});

// ГўВ”ВЂГўВ”ВЂ Station positions ГўВ”ВЂГўВ”ВЂ
// Actual needle angles track real frequency
const stationAngles = stations.map((s) => freqToAngle(parseFloat(s.freq)));

// Visual dot angles: evenly spread across 145Г‚В°ГўВЂВ“335Г‚В° so they're never crowded
// (clicking a dot still tunes to the real freq ГўВЂВ” needle goes to real angle)
const DOT_START = 145, DOT_END = 335;
const dotVisualAngles = stations.map((_, i) =>
  DOT_START + (i / (stations.length - 1)) * (DOT_END - DOT_START)
);

const dotsG  = document.getElementById('stationDots');
const hitsG  = document.getElementById('stationHits');
stations.forEach((s, i) => {
  const angle = dotVisualAngles[i];
  const pos   = toXY(CX, CY, R - 48, angle);

  // Hit target
  const hit = svgEl('circle', { cx: pos.x, cy: pos.y, r: 20, fill: 'transparent', cursor: 'pointer' });
  hit.addEventListener('click', () => tuneAndPlay(i));
  hitsG.appendChild(hit);

  // Visible dot
  const dot = svgEl('circle', {
    cx: pos.x, cy: pos.y, r: 7,
    fill: '#1e1830', stroke: '#3a3358', 'stroke-width': 1.5,
    cursor: 'pointer', id: 'sdot' + i
  });
  dot.addEventListener('click', () => tuneAndPlay(i));
  dotsG.appendChild(dot);

  // Short station label, staggered radius so they don't overlap
  const labelR = R - 48 + (i % 2 === 0 ? -28 : 28);
  const lpos = toXY(CX, CY, labelR, angle);
  const ltxt = svgEl('text', {
    x: lpos.x, y: lpos.y,
    'text-anchor': 'middle', 'dominant-baseline': 'middle',
    fill: '#3a3560', 'font-size': '9',
    'font-family': "'Share Tech Mono', monospace",
    id: 'slabel' + i
  });
  ltxt.textContent = s.freq;
  dotsG.appendChild(ltxt);
});

// ГўВ”ВЂГўВ”ВЂ Tuning animation ГўВ”ВЂГўВ”ВЂ
let currentAngle = ARC_START;
let targetAngle  = ARC_START;
let animFrame    = null;

function setArc(angle) {
  currentAngle = angle;
  document.getElementById('arcActive').setAttribute('d', svgArcPath(CX, CY, R, ARC_START, angle));
  document.getElementById('arcEdge').setAttribute('d', svgArcPath(CX, CY, R, ARC_START, angle));

  // Needle
  const tip  = toXY(CX, CY, R - 14, angle);
  const base = toXY(CX, CY, 30, angle);
  document.getElementById('needle1').setAttribute('x2', tip.x);
  document.getElementById('needle1').setAttribute('y2', tip.y);
  document.getElementById('needle1').setAttribute('x1', base.x);
  document.getElementById('needle1').setAttribute('y1', base.y);
  document.getElementById('needleTip').setAttribute('cx', tip.x);
  document.getElementById('needleTip').setAttribute('cy', tip.y);
}

function animateTo(target) {
  if (animFrame) cancelAnimationFrame(animFrame);
  const startA = currentAngle;
  const diff   = target - startA;
  const duration = Math.abs(diff) * 4; // ms per degree
  const startT = performance.now();

  function step(now) {
    const t = Math.min(1, (now - startT) / Math.max(duration, 80));
    const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t; // easeInOut
    setArc(startA + diff * ease);
    if (t < 1) animFrame = requestAnimationFrame(step);
  }
  animFrame = requestAnimationFrame(step);
}

// ГўВ”ВЂГўВ”ВЂ Audio playback ГўВ”ВЂГўВ”ВЂ
let current = -1;
let hlsInstance = null;
const audioEl = document.getElementById('audioPlayer');

function setTuningState(isTuning, stationName) {
  const npEl = document.getElementById('npStatus');
  if (isTuning) {
    npEl.style.visibility = 'visible';
    npEl.innerHTML = `
      <div class="tuning-bar"></div>
      <div class="tuning-bar"></div>
      <div class="tuning-bar"></div>
      <div class="tuning-bar"></div>
      <span style="margin-left:4px;color:#6a5aaa;font-size:9px;letter-spacing:.12em">TUNING</span>`;
    document.getElementById('stationName').textContent = stationName;
  } else {
    npEl.innerHTML = '<div class="np-live-dot"></div> LIVE';
    npEl.style.visibility = 'visible';
  }
}

function tuneAndPlay(idx) {
  // Update dot visuals
  stations.forEach((_, i) => {
    const d = document.getElementById('sdot' + i);
    const l = document.getElementById('slabel' + i);
    if (d) { d.setAttribute('fill', i === idx ? '#7c3aed' : '#1e1830'); d.setAttribute('stroke', i === idx ? '#a78bfa' : '#3a3358'); }
    if (l) { l.setAttribute('fill', i === idx ? '#a78bfa' : '#3a3560'); }
  });

  // Nav dots
  document.querySelectorAll('.s-nav-dot').forEach((d, i) => d.classList.toggle('active', i === idx));

  const s = stations[idx];

  // Animate dial needle to station
  animateTo(stationAngles[idx]);

  // Freq glitch + tuning UI
  document.getElementById('idleText').setAttribute('fill', 'transparent');
  document.getElementById('chanFreq').textContent = s.freq;
  setTuningState(true, s.name);
  startFreqGlitch(s.freq);

  // Play radio static immediately
  playStatic();

  // Stop previous audio
  current = idx;
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
  audioEl.src = '';
  audioEl.load();

  function onReady() {
    // Stop static, start station
    stopStatic(600);
    setTuningState(false, s.name);
    audioEl.muted = true;
    audioEl.play().then(() => {
      audioEl.muted = false;
    }).catch(() => {
      audioEl.muted = false;
      showError('Tap the station again to play.');
    });
  }

  if (Hls.isSupported()) {
    hlsInstance = new Hls({ enableWorker: false, startLevel: -1 });
    hlsInstance.loadSource(s.url);
    hlsInstance.attachMedia(audioEl);
    hlsInstance.on(Hls.Events.MANIFEST_PARSED, onReady);
    hlsInstance.on(Hls.Events.ERROR, function (_, data) {
      if (data.fatal) {
        stopStatic(200);
        setTuningState(false, s.name);
        showError('Stream error. Try another station.');
      }
    });
  } else if (audioEl.canPlayType('application/vnd.apple.mpegurl')) {
    audioEl.src = s.url;
    audioEl.addEventListener('canplay', onReady, { once: true });
  } else {
    stopStatic(200);
    showError('HLS not supported in this browser.');
  }
}

function showError(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 4000);
}

// ГўВ”ВЂГўВ”ВЂ Nav dots ГўВ”ВЂГўВ”ВЂ
const navEl = document.getElementById('stationNav');
stations.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 's-nav-dot';
  d.title = stations[i].name;
  d.addEventListener('click', () => tuneAndPlay(i));
  navEl.appendChild(d);
});

// ГўВ”ВЂГўВ”ВЂ Clock ГўВ”ВЂГўВ”ВЂ
function tick() {
  const n = new Date();
  document.getElementById('clockText').textContent =
    String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
}
tick();
setInterval(tick, 1000);

// ГўВ”ВЂГўВ”ВЂ Init arc at start position ГўВ”ВЂГўВ”ВЂ
setArc(ARC_START);
</script>
