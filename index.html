<!DOCTYPE html>
<html lang="ml">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Г ВґВ†Г ВґВ•Г ВґВѕГ ВґВ¶Г ВґВµГ ВґВѕГ ВґВЈГ ВґВї Malayalam Radio</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f12;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .radio-app { width: 400px; max-width: 100%; }

    /* ГўВ”ВЂГўВ”ВЂ Header ГўВ”ВЂГўВ”ВЂ */
    .header { text-align: center; margin-bottom: 28px; }
    .header-eyebrow {
      font-size: 10px; font-weight: 600; letter-spacing: 0.22em;
      color: rgba(255,255,255,0.3); text-transform: uppercase; margin-bottom: 8px;
    }
    .header-title {
      font-size: 26px; font-weight: 700; color: #fff; line-height: 1;
    }
    .header-sub { font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 6px; }

    /* ГўВ”ВЂГўВ”ВЂ Now Playing ГўВ”ВЂГўВ”ВЂ */
    .now-playing {
      background: #18181f;
      border: 1px solid rgba(139,109,224,0.18);
      border-radius: 16px;
      padding: 18px 20px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .np-icon {
      width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
      background: rgba(139,109,224,0.12);
      border: 1.5px solid rgba(139,109,224,0.25);
      display: flex; align-items: center; justify-content: center;
    }
    .np-bars {
      display: flex; align-items: flex-end; gap: 2.5px; height: 16px;
    }
    .np-bars span {
      display: block; width: 3px; border-radius: 2px; background: #8b6de0;
      animation: bar-bounce 1.1s ease-in-out infinite;
    }
    .np-bars span:nth-child(1) { height: 5px;  animation-delay: 0s; }
    .np-bars span:nth-child(2) { height: 13px; animation-delay: 0.18s; }
    .np-bars span:nth-child(3) { height: 8px;  animation-delay: 0.36s; }
    .np-bars span:nth-child(4) { height: 11px; animation-delay: 0.1s; }
    .np-bars.idle span { animation: none; height: 4px; background: rgba(255,255,255,0.18); }
    .np-bars.loading span { animation: bar-bounce 0.4s ease-in-out infinite; }
    @keyframes bar-bounce {
      0%,100% { transform: scaleY(0.5); }
      50%      { transform: scaleY(1.6); }
    }

    .np-text { flex: 1; overflow: hidden; }
    .np-idle { font-size: 13px; color: rgba(255,255,255,0.3); }
    .np-live-label {
      font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: #8b6de0; margin-bottom: 3px;
      display: flex; align-items: center; gap: 5px;
    }
    .live-pulse {
      width: 6px; height: 6px; border-radius: 50%; background: #8b6de0;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(139,109,224,0.6); }
      50%      { box-shadow: 0 0 0 5px rgba(139,109,224,0); }
    }
    .np-station-name {
      font-size: 15px; font-weight: 600; color: #fff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .np-freq {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 2px;
    }

    /* ГўВ”ВЂГўВ”ВЂ Station Cards ГўВ”ВЂГўВ”ВЂ */
    .stations { display: flex; flex-direction: column; gap: 8px; }

    .station-card {
      background: #18181f;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 14px 18px;
      display: flex; align-items: center; gap: 14px;
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .station-card:hover { background: #1e1e2a; border-color: rgba(139,109,224,0.2); }
    .station-card.active {
      background: rgba(139,109,224,0.09);
      border-color: rgba(139,109,224,0.4);
    }
    .station-card:active { transform: scale(0.98); }

    .s-num {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px; color: rgba(255,255,255,0.18); min-width: 18px;
    }
    .station-card.active .s-num { color: rgba(139,109,224,0.5); }

    .s-info { flex: 1; overflow: hidden; }
    .s-name {
      font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.65);
      white-space: nowraw; overflow: hidden; text-overflow: ellipsis;
    }
    .station-card.active .s-name { color: #fff; font-weight: 600; }
    .s-sub {
      font-size: 11px; color: rgba(255,255,255,0.28); margin-top: 2px;
    }

    .s-freq {
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px; font-weight: 600; color: rgba(139,109,224,0.45);
      flex-shrink: 0;
    }
    .station-card.active .s-freq { color: #8b6de0; }

    .s-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #8b6de0; flex-shrink: 0;
      display: none;
      animation: pulse 2s ease-in-out infinite;
    }
    .station-card.active .s-dot { display: block; }

    /* ГўВ”ВЂГўВ”ВЂ Footer ГўВ”ВЂГўВ”ВЂ */
    .footer {
      margin-top: 20px;
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 4px;
    }
    .f-clock {
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px; color: rgba(255,255,255,0.2);
    }
    .f-note { font-size: 10px; color: rgba(255,255,255,0.15); letter-spacing: 0.06em; }

    /* error toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #2a1a1a; border: 1px solid rgba(255,80,80,0.3);
      color: rgba(255,120,120,0.9); font-size: 12px; padding: 10px 18px;
      border-radius: 8px; display: none; z-index: 99;
    }
    .toast.show { display: block; }
  </style>
</head>
<body>

<!-- Hidden audio element ГўВЂВ” actual audio playback -->
<audio id="audioPlayer" preload="none"></audio>
<div class="toast" id="toast"></div>

<div class="radio-app">

  <!-- Header -->
  <div class="header">
    <div class="header-eyebrow">All India Radio Г‚В· Malayalam</div>
    <div class="header-title">Г ВґВ†Г ВґВ•Г ВґВѕГ ВґВ¶Г ВґВµГ ВґВѕГ ВґВЈГ ВґВї</div>
    <div class="header-sub">Live Streaming Г‚В· 5 Stations</div>
  </div>

  <!-- Now Playing -->
  <div class="now-playing">
    <div class="np-icon">
      <div class="np-bars idle" id="npBars">
        <span></span><span></span><span></span><span></span>
      </div>
    </div>
    <div class="np-text">
      <div class="np-idle" id="npIdle">Tap a station to listen</div>
      <div id="npActive" style="display:none">
        <div class="np-live-label"><span class="live-pulse"></span> Live</div>
        <div class="np-station-name" id="npName">ГўВЂВ”</div>
        <div class="np-freq" id="npFreq">ГўВЂВ”</div>
      </div>
    </div>
  </div>

  <!-- Station list -->
  <div class="stations" id="stationList"></div>

  <div class="footer">
    <span class="f-clock" id="clock">00:00</span>
    <span class="f-note">AIR Live Stream</span>
  </div>

</div>

<!-- HLS.js for cross-browser HLS support -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
<script>
  const stations = [
    {
      name: "Akashvani Kerala",
      short: "101.9 FM Г‚В· TVM",
      freq: "101.9",
      url: "https://air.pc.cdn.bitgravity.com/air/live/pbaudio230/playlist.m3u8"
    },
    {
      name: "AIR News 24x7",
      short: "102.6 FM Г‚В· News",
      freq: "102.6",
      url: "https://airhlspush.pc.cdn.bitgravity.com/httppush/hlspbaudio002/hlspbaudio002_Auto.m3u8"
    },
    {
      name: "FM Rainbow Kochi",
      short: "102.3 FM Г‚В· Kochi",
      freq: "102.3",
      url: "https://air.pc.cdn.bitgravity.com/air/live/pbaudio044/playlist.m3u8"
    },
    {
      name: "Akashvani Thrissur",
      short: "100.9 FM Г‚В· Thrissur",
      freq: "100.9",
      url: "https://air.pc.cdn.bitgravity.com/air/live/pbaudio036/playlist.m3u8"
    },
    {
      name: "VB Malayalam",
      short: "103.0 FM Г‚В· Vividh Bharati",
      freq: "103.0",
      url: "https://air.pc.cdn.bitgravity.com/air/live/pbaudio229/playlist.m3u8"
    },
  ];

  let current = -1;
  let hlsInstance = null;
  const audioEl = document.getElementById('audioPlayer');

  // Build station cards
  const listEl = document.getElementById('stationList');
  stations.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'station-card';
    card.id = 'card' + i;
    card.innerHTML =
      '<span class="s-num">' + String(i+1).padStart(2,'0') + '</span>' +
      '<div class="s-info">' +
        '<div class="s-name">' + s.name + '</div>' +
        '<div class="s-sub">' + s.short + '</div>' +
      '</div>' +
      '<span class="s-freq">' + s.freq + '</span>' +
      '<span class="s-dot"></span>';
    card.addEventListener('click', function() { play(i); });
    listEl.appendChild(card);
  });

  function play(idx) {
    // Deactivate previous card
    if (current >= 0) document.getElementById('card' + current).classList.remove('active');

    current = idx;
    var s = stations[idx];
    document.getElementById('card' + idx).classList.add('active');

    // Update now-playing UI
    document.getElementById('npIdle').style.display = 'none';
    document.getElementById('npActive').style.display = 'block';
    document.getElementById('npName').textContent = s.name;
    document.getElementById('npFreq').textContent = s.freq + ' FM';
    document.getElementById('npBars').className = 'np-bars loading';

    // Destroy previous HLS instance
    if (hlsInstance) {
      hlsInstance.destroy();
      hlsInstance = null;
    }
    audioEl.src = '';

    if (Hls.isSupported()) {
      hlsInstance = new Hls({ enableWorker: false });
      hlsInstance.loadSource(s.url);
      hlsInstance.attachMedia(audioEl);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
        audioEl.play().then(function() {
          document.getElementById('npBars').className = 'np-bars';
        }).catch(function(e) {
          showError('Playback blocked. Tap to try again.');
          document.getElementById('npBars').className = 'np-bars idle';
        });
      });
      hlsInstance.on(Hls.Events.ERROR, function(event, data) {
        if (data.fatal) {
          showError('Stream error. Try another station.');
          document.getElementById('npBars').className = 'np-bars idle';
        }
      });
    } else if (audioEl.canPlayType('application/vnd.apple.mpegurl')) {
      // Native HLS (Safari / iOS)
      audioEl.src = s.url;
      audioEl.play().then(function() {
        document.getElementById('npBars').className = 'np-bars';
      }).catch(function(e) {
        showError('Playback error. Tap to try again.');
        document.getElementById('npBars').className = 'np-bars idle';
      });
    } else {
      showError('HLS not supported in this browser.');
      document.getElementById('npBars').className = 'np-bars idle';
    }
  }

  function showError(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 4000);
  }

  // Clock
  function tick() {
    var now = new Date();
    document.getElementById('clock').textContent =
      String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  }
  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
